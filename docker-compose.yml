version: "3.9"

services:
  api:
    build: .
    ports:
      - "5001:5001"
    volumes:
      - ./models:/app/models

  mlflow:
    image: python:3.11-slim
    command: >
      sh -c "pip install mlflow &&
             mlflow server
             --backend-store-uri sqlite:///mlflow.db
             --host 0.0.0.0
             --port 5000"
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns